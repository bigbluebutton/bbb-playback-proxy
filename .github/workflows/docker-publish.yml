name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Docker tag to build and publish'
        required: true
        default: 'jammy-300-alpine'
        type: choice
        options:
          - jammy-300-alpine
          - latest
          - both

env:
  IMAGE_NAME: bigbluebutton/bbb-playback-proxy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          IMAGE="${{ env.IMAGE_NAME }}"
          if [ "${{ inputs.release_type }}" == "both" ]; then
            echo "tags=${IMAGE}:latest,${IMAGE}:jammy-300-alpine" >> $GITHUB_OUTPUT
          else
            echo "tags=${IMAGE}:${{ inputs.release_type }}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
